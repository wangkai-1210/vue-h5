name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      
    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Version info
      run: |
        node -v
        npm -v
        
    - name: Install
      run: |
        npm ci || npm install --legacy-peer-deps
      
    - name: Build
      run: |
        npm run build
      env:
        CI: false
        NODE_OPTIONS: '--max-old-space-size=4096'
      
    - name: Verify
      run: |
        if [ -d "dist" ]; then
          echo "Build successful"
          ls -la dist/
        else
          echo "Build failed"
          exit 1
        fi
      
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        force_orphan: true